version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: spark-analysis-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: spark123
      MYSQL_DATABASE: spark_ai_analyzer
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pspark123"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
